spring:
  cloud:
    gateway:
      routes:
        - id: zone-service
          uri: lb://zone-service
          predicates:
            - Path=/api/zones, /api/zones/**
        - id: sensor-service
          uri: lb://sensor-service
          predicates:
            - Path=/api/sensors, /api/sensors/**
        - id: automation-service
          uri: lb://automation-service
          predicates:
            - Path=/api/automation, /api/automation/**
        - id: crop-service
          uri: lb://crop-service
          predicates:
            - Path=/api/crops, /api/crops/**
    loadbalancer:
      cache:
        ttl: 5s